<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <main>
    <article class="card-blog">
      <figure class="card-image">
        <img src="./assets/images/illustration-article.svg" alt="Ilustration article">
      </figure>

      <p class="card-tag">Learning</p>

      <p class="card-time">Published <time datetime="21-12-2023">21 Dec 2023</time></p>

      <h1 class="card-tittle">HTML & CSS foundations</h1>

      <p class="card-description">These languages are the backbone of every website, defining structure, content, and
        presentation.

      <div class="card-author">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper">
        <p>Greg Hooper</p>

      </div>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>

</html>
