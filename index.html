<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">

  <title>Frontend Mentor | Blog preview card</title>

</head>

<body>
  <main>
    <article class="blog-card">
      <div class="blog-card__body">
        <img class="blog-card__cover" src="./assets/images/illustration-article.svg" alt="Article illustration">
        <div class="blog-card__content">
          <a href="#" class="blog-card__category" onclick="return false">Learning</a>
          <p class="blog-card__date">Published <time datetime="2023-12-21">21 Dec 2023</time></p>

          <a href="#" class="blog-card__title" onclick="return false">HTML & CSS foundations</a>

          <p class="blog-card__excerpt">These languages are the backbone of every website, defining structure, content,
            and
            presentation.</p>
        </div>
      </div>
      <a href="#" class="blog-card__author" onclick="return false">
        <img class="blog-card__avatar" src="./assets/images/image-avatar.webp" alt="Greg Hooper">
        <p>Greg Hooper</p>
      </a>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer"
      aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor</a>.
    Coded by <a href="https://github.com/0rafae1" target="_blank" rel="noopener noreferrer"
      aria-label="Rafael GitHub profile (opens in a new tab)">Rafael</a>.
  </footer>
</body>

</html>
